<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/web-core-4.7/style.css">
    <title>Homework Landing Page</title>
</head>
<body>
    <main>
        <div class="container">
            <h1>Get iinto it today</h1>
            <p>There is no charge or obligation upon registration.</p>
            <img src="/web-core-4.7/image/bg.jpg" alt="pc graphics, graphics, notebook"
        </div>

        <div>
            <a href="https://www.facebook.com/" class="Facebook">
                <button>Register with Facebook</button></a>
            <a href="https://www.linkedin.com/" class="Linkedin">
                <button>Register with Linkedin</button></a>
            <p>OR</p>
        </div>

    <form action="https://chat.deepseek.com/" method="get" class="form-button">
        <div class="Email">
            <label>
                <input type="email" id="email" name="email" placeholder="gus.goodwin@gmail.com" required> Email
            </label>
        </div> 

        <div class="Phone">
            <label>
                <input type="tel" name="Phone" id="tel" required> Phone
            </label>
        </div>   
        <div class="Main-text">
            <h1>What type of investor are you?</h1>
            <p>Select the type of investor you are below</p>
        </div>

        <div class="radio-button">
            <label>
                <input type="radio" id="Individual" name="options"
                value="Individual" required>Individual
            </label>
            <label>
                <input type="radio" id="Business" name="options"
                value="Business" required> Business
            </label>
            <label>
                <input type="radio" id="IRA" name="options"
                value="IRA" required> IRA
            </label>
            <label>
                <input type="radio" id="Trust" name="options"
                value="Trust" required>Trust
            </label>
        </div>

            <label class="checkbox">
                <input type="checkbox" id="checkbox" name="terms-agreed"
                value="trust" required> I agree to the terms and receiving notifications from iintoo 
                <a href="https://medium.com/@TermsFeed/12-ways-to-show-your-terms-to-users-156ad6c8416e">View full terms</a>
            </label>
            
        <div class="form button">
            <button type="submit" value="Create Account">Create account</button>
        </div>
    </form>

    </main>
</body>
</html>
